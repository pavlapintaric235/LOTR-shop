name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: lotr_user
          POSTGRES_PASSWORD: change_me
          POSTGRES_DB: lotr_shop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U lotr_user -d lotr_shop_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+asyncpg://lotr_user:change_me@127.0.0.1:5432/lotr_shop_test
      TEST_DATABASE_URL: postgresql+asyncpg://lotr_user:change_me@127.0.0.1:5432/lotr_shop_test
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ENVIRONMENT: test
      DEBUG: "false"
      TESTING_ROUTES_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import time
          import psycopg2

          for attempt in range(30):
              try:
                  conn = psycopg2.connect(
                      host="127.0.0.1",
                      port=5432,
                      user="lotr_user",
                      password="change_me",
                      dbname="lotr_shop_test",
                  )
                  conn.close()
                  print("Postgres is ready")
                  break
              except Exception as exc:
                  print(f"Waiting for Postgres... {attempt + 1}/30 -> {exc}")
                  time.sleep(2)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Run tests
        run: pytest -vv
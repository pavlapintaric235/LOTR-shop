services:
  - type: web
    name: lotr-shop
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: TESTING_ROUTES_ENABLED
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false